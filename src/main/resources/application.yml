server:
  port: 5000

external:
  api:
    base-url: http://localhost:3001

similar-products:
  detail-timeout-ms: 1500
  max-similar-ids: 20
  pool-size: 16
  queue-capacity: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: similar-products-contract
        url: /openapi/similar-products.yaml
